tosca_definitions_version: tosca_simple_yaml_1_3
metadata:
  template_name: cloud-edge-json
topology_template:
  node_templates:
    cloud:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 64
            mem_size: 128 GB
    edge-a:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 16
            mem_size: 32 GB
    edge-b:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 12
            mem_size: 24 GB
    edge_a_cloud_network:
      type: tosca.nodes.network.Network
      properties:
        network_name: edge_a_cloud_network
    edge_a_cloud_edge_a_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: edge-a
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_a_cloud_network
          relationship: tosca.relationships.network.LinksTo
    edge_a_cloud_cloud_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: cloud
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_a_cloud_network
          relationship: tosca.relationships.network.LinksTo
    edge_a_edge_b_network:
      type: tosca.nodes.network.Network
      properties:
        network_name: edge_a_edge_b_network
    edge_a_edge_b_edge_a_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: edge-a
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_a_edge_b_network
          relationship: tosca.relationships.network.LinksTo
    edge_a_edge_b_edge_b_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: edge-b
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_a_edge_b_network
          relationship: tosca.relationships.network.LinksTo
    edge_b_cloud_network:
      type: tosca.nodes.network.Network
      properties:
        network_name: edge_b_cloud_network
    edge_b_cloud_edge_b_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: edge-b
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_b_cloud_network
          relationship: tosca.relationships.network.LinksTo
    edge_b_cloud_cloud_port:
      type: tosca.nodes.network.Port
      requirements:
      - binding:
          node: cloud
          relationship: tosca.relationships.HostedOn
      - link:
          node: edge_b_cloud_network
          relationship: tosca.relationships.network.LinksTo
x-eclypse:
  kind: infrastructure
  id: cloud-edge-json
  graph:
    scenario: io-round-trip
    source_format: eclypse-json
  nodes:
    cloud:
      cpu: 64
      ram: 128
      storage: 2048
      gpu: 32
      availability: 0.999
      processing_time: 5
      tier: cloud
    edge-a:
      cpu: 16
      ram: 32
      storage: 512
      gpu: 128
      availability: 0.995
      processing_time: 3
      tier: edge
    edge-b:
      cpu: 12
      ram: 24
      storage: 256
      gpu: 2
      availability: 0.99
      processing_time: 23
      tier: edge
  edges:
  - source: edge-a
    target: cloud
    attrs:
      latency: 18
      bandwidth: 500
      link_type: wan
  - source: edge-a
    target: edge-b
    attrs:
      latency: 4
      bandwidth: 1000
      link_type: lan
  - source: edge-b
    target: cloud
    attrs:
      latency: 22
      bandwidth: 450
      link_type: wan
  path_assets_aggregators:
  - bandwidth
  - latency
