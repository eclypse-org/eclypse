tosca_definitions_version: tosca_simple_yaml_1_3
metadata:
  template_name: application
topology_template:
  node_templates:
    camera-gateway:
      type: tosca.nodes.SoftwareComponent
      requirements:
      - dependency:
          node: inference
          relationship: tosca.relationships.DependsOn
    inference:
      type: tosca.nodes.SoftwareComponent
      requirements:
      - dependency:
          node: dashboard
          relationship: tosca.relationships.DependsOn
    dashboard:
      type: tosca.nodes.SoftwareComponent
x-eclypse:
