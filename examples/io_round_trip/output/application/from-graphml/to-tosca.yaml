    inference:
      cpu: 4.0
      ram: 6.0
      storage: 4
      gpu: 128
      availability: 0.9903178267948178
      processing_time: 3
      image: ghcr.io/eclypse/inference:latest
    dashboard:
      cpu: 1.0
      ram: 1.0
      storage: 512
      gpu: 2
      availability: 0.9956124506293861
      processing_time: 23
      build: ./dashboard
  edges:
  - source: camera-gateway
    target: inference
    attrs:
      latency: 8.0
      bandwidth: 80.0
  - source: inference
    target: dashboard
