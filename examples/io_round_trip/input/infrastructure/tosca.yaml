tosca_definitions_version: tosca_simple_yaml_1_3
metadata:
  template_name: cloud-edge-tosca

topology_template:
  node_templates:
    cloud:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 64
            mem_size: 128 GB
    edge-a:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 16
            mem_size: 32 GB
    edge-b:
      type: tosca.nodes.Compute
      capabilities:
        host:
          properties:
            num_cpus: 12
            mem_size: 24 GB
    factory-net:
      type: tosca.nodes.network.Network
    edge-a-port:
      type: tosca.nodes.network.Port
      requirements:
        - binding:
            node: edge-a
            relationship: tosca.relationships.HostedOn
        - link:
            node: factory-net
            relationship: tosca.relationships.network.LinksTo
    edge-b-port:
      type: tosca.nodes.network.Port
      requirements:
        - binding:
            node: edge-b
            relationship: tosca.relationships.HostedOn
        - link:
            node: factory-net
            relationship: tosca.relationships.network.LinksTo

x-eclypse:
  kind: infrastructure
  id: cloud-edge-tosca
  graph:
    scenario: io-round-trip
    source_format: tosca
  nodes:
    cloud:
      cpu: 64
      ram: 128
      storage: 2048
      availability: 0.999
      tier: cloud
    edge-a:
      cpu: 16
      ram: 32
      storage: 512
      availability: 0.995
      tier: edge
    edge-b:
      cpu: 12
      ram: 24
      storage: 256
      availability: 0.99
      tier: edge
  edges:
    - source: edge-a
      target: cloud
      attrs:
        latency: 18
        bandwidth: 500
        link_type: wan
    - source: edge-b
      target: cloud
      attrs:
        latency: 22
        bandwidth: 450
        link_type: wan
    - source: edge-a
      target: edge-b
      attrs:
        latency: 4
        bandwidth: 1000
        link_type: lan
