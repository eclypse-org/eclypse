name: vision-compose

services:
  camera-gateway:
    image: ghcr.io/eclypse/camera-gateway:latest
    x-eclypse-assets:
      cpu: 1
      ram: 1

  inference:
    image: ghcr.io/eclypse/inference:latest
    depends_on:
      - camera-gateway
    x-eclypse-assets:
      cpu: 4
      ram: 6
    x-eclypse-edges:
      camera-gateway:
        latency: 8
        bandwidth: 80

  dashboard:
    build: ./dashboard
    depends_on:
      - inference
    x-eclypse-assets:
      cpu: 1
      ram: 1
    x-eclypse-edges:
      inference:
        latency: 5
        bandwidth: 40

x-eclypse:
  kind: application
  id: vision-compose
  graph:
    scenario: io-round-trip
    source_format: docker-compose
  flows:
    - [camera-gateway, inference, dashboard]
